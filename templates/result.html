<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Exam Result</title>

    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-slate-100 min-h-screen flex items-center justify-center">

<div class="bg-white shadow-xl rounded-2xl p-10 w-full max-w-lg text-center">

    <h1 class="text-4xl font-bold text-slate-800 mb-6">

        Exam Completed 🎉

    </h1>

    <p class="text-gray-500 mb-8">

        Here is your performance.

    </p>

    <div class="bg-blue-50 rounded-xl p-8 mb-8">

        <h2 class="text-6xl font-bold text-blue-600">

            {{ score }}/{{ total }}

        </h2>

        <p class="mt-3 text-gray-600">

            Final Score

        </p>

    </div>

    <div class="grid grid-cols-2 gap-5 mb-8">

        <div class="bg-green-100 rounded-xl p-5">

            <p class="text-green-700 font-semibold">

                Percentage

            </p>

            <p class="text-2xl font-bold">

                {{ ((score / total) * 100)|round(1) }}%

            </p>

        </div>

        <div class="bg-slate-100 rounded-xl p-5">

            <p class="text-slate-700 font-semibold">

                Grade

            </p>

            <p class="text-2xl font-bold">

                {% if (score / total) >= 0.7 %}
                    A
                {% elif (score / total) >= 0.6 %}
                    B
                {% elif (score / total) >= 0.5 %}
                    C
                {% else %}
                    F
                {% endif %}

            </p>

        </div>

    </div>

    <a href="{{ url_for('dashboard') }}"
       class="inline-block bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-xl font-semibold transition">

        Back to Dashboard

    </a>

</div>

</body>
</html>
