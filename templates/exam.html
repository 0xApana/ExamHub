<!DOCTYPE html>
<html>
<head>
    <title>ExamHub - Examination</title>
</head>
<body>

<h1>ExamHub Examination</h1>

<h2>{{ question["course"] }}</h2>

<p><strong>Question:</strong></p>

<p>{{ question["question"] }}</p>

<form>

    <input type="radio" name="answer" value="A">
    {{ question["option_a"] }}

    <br><br>

    <input type="radio" name="answer" value="B">
    {{ question["option_b"] }}

    <br><br>

    <input type="radio" name="answer" value="C">
    {{ question["option_c"] }}

    <br><br>

    <input type="radio" name="answer" value="D">
    {{ question["option_d"] }}

    <br><br>

    <button type="submit">
        Next
    </button>

</form>

</body>
</html>
