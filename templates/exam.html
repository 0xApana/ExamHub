<!DOCTYPE html>
<html>
<head>
    <title>ExamHub - Examination</title>
</head>
<body>

<h1>ExamHub Examination</h1>

<h2>{{ question["course"] }}</h2>

<p><strong>Question:</strong></p>

<p>{{ question["question"] }}</p>

<form method="POST" action="{{ url_for('save_answer') }}">

    <input
        type="hidden"
        name="question_id"
        value="{{ question['id'] }}">

    <input type="radio" name="answer" value="A">
    {{ question["option_a"] }}

    <br><br>

    <input type="radio" name="answer" value="B">
    {{ question["option_b"] }}

    <br><br>

    <input type="radio" name="answer" value="C">
    {{ question["option_c"] }}

    <br><br>

    <input type="radio" name="answer" value="D">
    {{ question["option_d"] }}

    <br><br>

    <div class="navigation">

        <a href="{{ url_for('previous_question') }}" class="btn">
            Previous
        </a>

        <button type="submit" class="btn">
            Next
        </button>

    </div>

</form>

</body>
</html>
