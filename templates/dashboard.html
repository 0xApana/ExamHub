<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dashboard | ExamHub</title>

    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-slate-100">

<header class="bg-slate-900 text-white shadow">

    <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">

        <h1 class="text-3xl font-bold">
            ExamHub
        </h1>

        <a href="{{ url_for('logout') }}"
           class="bg-red-600 hover:bg-red-700 px-4 py-2 rounded-lg transition">

            Logout

        </a>

    </div>

</header>

<main class="max-w-5xl mx-auto py-10 px-6">

    <div class="bg-white rounded-2xl shadow-lg p-8 mb-8">

        <h2 class="text-3xl font-bold text-slate-800">

            Welcome,

            {{ student["fullname"] }}

        </h2>

        <p class="text-gray-500 mt-2">

            Select a course and the number of questions to begin your examination.

        </p>

    </div>

    <form
        action="{{ url_for('start_exam') }}"
        method="POST"
        class="bg-white rounded-2xl shadow-lg p-8">

        <h3 class="text-2xl font-bold mb-6">

            Available Courses

        </h3>

        <div class="space-y-4">

            {% for course in courses %}

            <label class="flex justify-between items-center border rounded-xl p-4 cursor-pointer hover:bg-blue-50 hover:border-blue-500 transition">

                <div class="flex items-center gap-3">

                    <input
                        type="radio"
                        name="course"
                        value="{{ course['course'] }}"
                        required>

                    <span class="font-medium">

                        {{ course["course"] }}

                    </span>

                </div>

                <span class="text-sm text-gray-500">

                    {{ course["total_questions"] }} Questions

                </span>

            </label>

            {% endfor %}

        </div>

        <hr class="my-8">

        <h3 class="text-2xl font-bold mb-6">

            Questions to Attempt

        </h3>

        <div class="grid grid-cols-3 gap-4">

            <label class="border rounded-xl p-5 text-center cursor-pointer hover:bg-blue-50">

                <input
                    type="radio"
                    name="exam_size"
                    value="10"
                    required>

                <div class="mt-2 font-semibold">

                    10 Questions

                </div>

            </label>

            <label class="border rounded-xl p-5 text-center cursor-pointer hover:bg-blue-50">

                <input
                    type="radio"
                    name="exam_size"
                    value="20">

                <div class="mt-2 font-semibold">

                    20 Questions

                </div>

            </label>

            <label class="border rounded-xl p-5 text-center cursor-pointer hover:bg-blue-50">

                <input
                    type="radio"
                    name="exam_size"
                    value="40">

                <div class="mt-2 font-semibold">

                    40 Questions

                </div>

            </label>

        </div>

        <button
            class="w-full mt-8 bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-xl font-semibold transition">

            Start Examination

        </button>

    </form>

</main>

</body>
</html>
